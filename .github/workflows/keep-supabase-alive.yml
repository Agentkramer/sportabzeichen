name: Keep Supabase Alive

on:
  schedule:
    - cron: '54 8 * * 1,4'   # Every Monday and Thursday at 8:54 AM UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/keep_alive" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            --fail \
            --silent \
            --show-error
          echo "Ping successful at $(date)"
