name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 * * 1,4'   # Every Monday and Thursday at 8:00 AM UTC
  workflow_dispatch:          # Allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/participants?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --fail \
            --silent \
            --show-error
          echo "Ping successful at $(date)"